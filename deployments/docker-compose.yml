version: "3.9"

services:
  pys:
    build:
      context: ..
      dockerfile: deployments/ics-docker/Dockerfile
    privileged: true
    working_dir: /src
    entrypoint: ["./start.sh", "FactorySimulation.py"]
    container_name: pys
    volumes:
      - ../src:/src
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      fnet:
        ipv4_address: 192.168.1.31

networks:
  fnet:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.1.0/24